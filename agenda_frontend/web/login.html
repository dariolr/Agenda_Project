<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reindirizzamento accesso</title>
  <style>
    :root {
      color-scheme: light;
      --text: #1f1f1f;
      --muted: #5f6368;
      --surface: #ffffff;
      --border: #d8dce2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--surface);
    }

    .panel {
      width: min(100%, 420px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .text {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1 class="title">Reindirizzamento in corso</h1>
    <p class="text">Ti stiamo portando alla pagina di accesso.</p>
  </main>

  <script>
    (function () {
      const currentUrl = new URL(window.location.href);
      const params = new URLSearchParams(currentUrl.search);
      const slug = (params.get('slug') || '').trim();

      if (!slug) {
        window.location.replace('/login');
        return;
      }

      params.delete('slug');

      const targetPath = '/' + encodeURIComponent(slug) + '/login';
      const targetQuery = params.toString();
      const targetUrl = targetQuery ? targetPath + '?' + targetQuery : targetPath;

      window.location.replace(targetUrl);
    })();
  </script>

  <noscript>
    <main class="panel">
      <p class="text">Attiva JavaScript per continuare verso la pagina di accesso.</p>
    </main>
  </noscript>
</body>
</html>
