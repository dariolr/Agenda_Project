<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Prenota il tuo appuntamento online">

  <!-- Preconnect removed: API URL is configured at build time via dart-define -->

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Prenota online">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Prenota online</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Versione app esposta a Flutter -->
  <script>
    window.appVersion = "20260429-9.80";
    
    // Localizzazioni per loading screen
    window.loadingTexts = {
      'it': 'Caricamento...',
      'en': 'Loading...'
    };
    
    // Rileva lingua browser (default: italiano)
    function getLoadingText() {
      var lang = (navigator.language || navigator.userLanguage || 'it').substring(0, 2).toLowerCase();
      return window.loadingTexts[lang] || window.loadingTexts['it'];
    }
  </script>

  <style>
    /* Loading screen mentre Flutter si carica */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fefefe;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      /* binario: colore primario a ~15% opacità (aggiornato via JS con colore cache) */
      border: 4px solid rgba(33, 150, 243, 0.15);
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      color: #666;
      letter-spacing: 0.5px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <div id="loading-text" class="loading-text"></div>
  </div>

  <script>
    // Imposta testo loading in base alla lingua del browser
    document.getElementById('loading-text').textContent = getLoadingText();

    // Applica il colore del business alla loading screen (se presente in cache)
    (function() {
      try {
        var segments = window.location.pathname.split('/').filter(function(s) { return s.length > 0; });
        if (segments.length > 0) {
          var reserved = ['reset-password','login','register','booking','my-bookings','change-password','profile','privacy','terms','login.html'];
          var slug = segments[0];
          if (reserved.indexOf(slug) === -1) {
            var cached = localStorage.getItem('agenda_primary_color_' + slug);
            if (cached) {
              var spinner = document.querySelector('.loading-spinner');
              // Arco attivo: colore pieno del business
              spinner.style.borderTopColor = cached;
              // Binario: stessa tinta al 15% di opacità
              var r = parseInt(cached.slice(1,3),16);
              var g = parseInt(cached.slice(3,5),16);
              var b = parseInt(cached.slice(5,7),16);
              spinner.style.borderColor = 'rgba('+r+','+g+','+b+',0.15)';
              spinner.style.borderTopColor = cached;
            }
          }
        }
      } catch(e) {}
    })();
  </script>

  <script>
    document.write('<script src="flutter_bootstrap.js?v=' + window.appVersion + '" async><\/script>');
  </script>

  <script>
    // Rimuovi loading screen quando Flutter è pronto.
    // Doppio rAF: assicura che il canvas sia completamente dipinto prima di rimuovere il loader,
    // evitando il flash bianco tra HTML e Flutter.
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-screen');
      if (!loader) return;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          loader.remove();
        });
      });
    });
  </script>
</body>
</html>
